<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpendSmart - Expense Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
.container { max-width: 950px; margin: 0 auto; }
.header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 48px; height: 48px; }
.logo-text h1 { color: #1a73e8; font-size: 28px; font-weight: 800; }
.logo-text p { color: #888; font-size: 13px; }
.card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { color: #333; margin-bottom: 15px; font-size: 18px; }
.form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #1a73e8; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
.btn-green { background: #34a853; color: white; }
.btn-grey { background: #999; color: white; }
.btn-blue { background: #1a73e8; color: white; padding: 6px 14px; font-size: 13px; }
.btn-red { background: #ea4335; color: white; padding: 6px 14px; font-size: 13px; }
.btn:hover { opacity: 0.9; }
.summary-card { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.summary-card h2 { color: white; margin-bottom: 10px; }
.summary-total { font-size: 36px; font-weight: bold; margin-bottom: 10px; }
.summary-breakdown { display: flex; flex-wrap: wrap; gap: 10px; }
.badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 13px; }
.insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
.insight-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #1a73e8; }
.insight-card.warning { border-left-color: #f29900; }
.insight-card.success { border-left-color: #34a853; }
.insight-card.danger { border-left-color: #ea4335; }
.insight-icon { font-size: 24px; margin-bottom: 8px; }
.insight-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.insight-value { font-size: 16px; font-weight: bold; color: #333; }
.insight-tip { font-size: 12px; color: #666; margin-top: 4px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
table { width: 100%; border-collapse: collapse; }
th { background: #f8f9fa; color: #555; font-size: 13px; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
tr:hover { background: #fafafa; }
.category-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
.Food { background: #fce8e6; color: #c5221f; }
.Transport { background: #e8f0fe; color: #1a73e8; }
.Shopping { background: #fef7e0; color: #f29900; }
.Bills { background: #f3e8fd; color: #7b1fa2; }
.Entertainment { background: #e6f4ea; color: #1e8e3e; }
.Other { background: #f1f3f4; color: #555; }
.empty { text-align: center; color: #999; padding: 30px; }
.actions { display: flex; gap: 5px; }
</style>
</head>
<body>
<div class="container">

<div class="header">
    <div class="logo">
        <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="24" fill="#1a73e8"/>
            <circle cx="24" cy="24" r="18" fill="white" opacity="0.15"/>
            <text x="24" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="white" font-family="Arial">S</text>
            <circle cx="24" cy="16" r="2" fill="#ffd700"/>
            <circle cx="24" cy="34" r="2" fill="#ffd700"/>
        </svg>
        <div class="logo-text">
            <h1>SpendSmart</h1>
            <p>Track your expenses, spend smarter</p>
        </div>
    </div>
</div>

<div class="card">
    <h2 id="form-title">Add Expense</h2>
    <div class="form-row">
        <input id="title" placeholder="Title e.g. Coffee at Starbucks" style="width:280px">
        <input id="amount" type="number" placeholder="Amount (Rs.)" style="width:150px">
        <select id="category" style="width:160px">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
        </select>
        <input id="date" type="date" style="width:160px">
    </div>
    <div class="form-row">
        <textarea id="note" placeholder="Note (optional)" rows="2" style="width:400px"></textarea>
    </div>
    <div class="form-row">
        <button class="btn btn-green" onclick="submitExpense()">Save Expense</button>
        <button class="btn btn-grey" onclick="cancelEdit()" id="cancel-btn" style="display:none">Cancel</button>
    </div>
</div>

<div class="summary-card" id="summary">
    <h2>This Month</h2>
    <div class="summary-total">Rs. 0.00</div>
    <div class="summary-breakdown">No expenses yet</div>
</div>

<div class="insights-grid" id="insights"></div>

<div class="card">
    <h2>Filter Expenses</h2>
    <div class="filter-row">
        <select id="filter-category" onchange="loadExpenses()" style="width:160px">
            <option value="">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
        </select>
        <input id="filter-title" placeholder="Search title..." oninput="loadExpenses()" style="width:200px">
        <input id="filter-from" type="date" onchange="loadExpenses()">
        <input id="filter-to" type="date" onchange="loadExpenses()">
        <button class="btn btn-grey" onclick="clearFilters()">Clear</button>
    </div>
</div>

<div class="card">
    <h2>All Expenses</h2>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Note</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="expenses-table"></tbody>
    </table>
</div>

</div>

<script>
let editingId = null;
let allExpenses = [];
document.getElementById("date").valueAsDate = new Date();

async function loadExpenses() {
    const category = document.getElementById("filter-category").value;
    const title = document.getElementById("filter-title").value;
    const from = document.getElementById("filter-from").value;
    const to = document.getElementById("filter-to").value;
    let url = "/expenses?";
    if (category) url += "category=" + category + "&";
    if (title) url += "title=" + title + "&";
    if (from) url += "from_date=" + from + "&";
    if (to) url += "to_date=" + to + "&";
    const res = await fetch(url);
    const data = await res.json();
    allExpenses = data;
    const tbody = document.getElementById("expenses-table");
    tbody.innerHTML = "";
    if (data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='6' class='empty'>No expenses found. Start adding above!</td></tr>";
        return;
    }
    data.forEach(function(e) {
        tbody.innerHTML += "<tr>" +
            "<td><strong>" + e.title + "</strong></td>" +
            "<td><strong>Rs." + e.amount + "</strong></td>" +
            "<td><span class='category-badge " + e.category + "'>" + e.category + "</span></td>" +
            "<td>" + e.date + "</td>" +
            "<td>" + (e.note || "-") + "</td>" +
            "<td class='actions'>" +
            "<button class='btn btn-blue' onclick='editExpense(" + e.id + ", \"" + e.title + "\", " + e.amount + ", \"" + e.category + "\", \"" + e.date + "\", \"" + e.note + "\")'>Edit</button>" +
            "<button class='btn btn-red' onclick='deleteExpense(" + e.id + ")'>Delete</button>" +
            "</td></tr>";
    });
}

async function loadSummary() {
    const res = await fetch("/summary");
    const data = await res.json();
    let breakdown = Object.entries(data.breakdown)
        .map(function(entry) { return "<span class='badge'>" + entry[0] + ": Rs." + entry[1].toFixed(2) + "</span>"; })
        .join("");
    document.getElementById("summary").innerHTML =
        "<h2>This Month (" + data.month + ")</h2>" +
        "<div class='summary-total'>Rs. " + data.total.toFixed(2) + "</div>" +
        "<div class='summary-breakdown'>" + (breakdown || "No expenses yet") + "</div>";
    loadInsights(data);
}

function loadInsights(data) {
    const container = document.getElementById("insights");
    container.innerHTML = "";
    if (data.total === 0) return;
    const topCategory = Object.entries(data.breakdown).sort(function(a,b){ return b[1]-a[1]; })[0];
    const totalCount = allExpenses.length;
    const biggest = allExpenses.reduce(function(max, e){ return e.amount > max.amount ? e : max; }, allExpenses[0]);
    const dayOfMonth = new Date().getDate();
    const dailyAvg = data.total / dayOfMonth;
    const warningClass = data.total > 10000 ? "danger" : data.total > 5000 ? "warning" : "success";
    const warningTip = data.total > 10000 ? "High spending this month!" : data.total > 5000 ? "Spending is moderate" : "Great job keeping expenses low!";
    const statusText = data.total > 10000 ? "High" : data.total > 5000 ? "Moderate" : "Low";
    container.innerHTML =
        "<div class='insight-card'>" +
            "<div class='insight-icon'>[TOP]</div>" +
            "<div class='insight-label'>Top Spending Category</div>" +
            "<div class='insight-value'>" + topCategory[0] + "</div>" +
            "<div class='insight-tip'>Rs." + topCategory[1].toFixed(2) + " spent</div>" +
        "</div>" +
        "<div class='insight-card'>" +
            "<div class='insight-icon'>[MAX]</div>" +
            "<div class='insight-label'>Biggest Expense</div>" +
            "<div class='insight-value'>" + biggest.title + "</div>" +
            "<div class='insight-tip'>Rs." + biggest.amount + "</div>" +
        "</div>" +
        "<div class='insight-card'>" +
            "<div class='insight-icon'>[AVG]</div>" +
            "<div class='insight-label'>Daily Average</div>" +
            "<div class='insight-value'>Rs." + dailyAvg.toFixed(2) + "</div>" +
            "<div class='insight-tip'>Based on " + dayOfMonth + " days</div>" +
        "</div>" +
        "<div class='insight-card " + warningClass + "'>" +
            "<div class='insight-icon'>[STATUS]</div>" +
            "<div class='insight-label'>Spending Status</div>" +
            "<div class='insight-value'>" + statusText + "</div>" +
            "<div class='insight-tip'>" + warningTip + "</div>" +
        "</div>" +
        "<div class='insight-card'>" +
            "<div class='insight-icon'>[COUNT]</div>" +
            "<div class='insight-label'>Total Transactions</div>" +
            "<div class='insight-value'>" + totalCount + " expenses</div>" +
            "<div class='insight-tip'>This month so far</div>" +
        "</div>";
}

async function submitExpense() {
    const title = document.getElementById("title").value;
    const amount = document.getElementById("amount").value;
    const category = document.getElementById("category").value;
    const date = document.getElementById("date").value;
    const note = document.getElementById("note").value;
    if (!title || !amount || !date) { alert("Title, amount and date are required."); return; }
    const body = { title: title, amount: parseFloat(amount), category: category, date: date, note: note };
    const url = editingId ? "/expenses/" + editingId : "/expenses";
    const method = editingId ? "PUT" : "POST";
    await fetch(url, { method: method, headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    cancelEdit();
    loadExpenses();
    loadSummary();
}

function editExpense(id, title, amount, category, date, note) {
    editingId = id;
    document.getElementById("title").value = title;
    document.getElementById("amount").value = amount;
    document.getElementById("category").value = category;
    document.getElementById("date").value = date;
    document.getElementById("note").value = note === "undefined" ? "" : note;
    document.getElementById("form-title").textContent = "Edit Expense";
    document.getElementById("cancel-btn").style.display = "inline";
    window.scrollTo(0, 0);
}

function cancelEdit() {
    editingId = null;
    document.getElementById("title").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").valueAsDate = new Date();
    document.getElementById("note").value = "";
    document.getElementById("form-title").textContent = "Add Expense";
    document.getElementById("cancel-btn").style.display = "none";
}

async function deleteExpense(id) {
    if (!confirm("Delete this expense?")) return;
    await fetch("/expenses/" + id, { method: "DELETE" });
    loadExpenses();
    loadSummary();
}

function clearFilters() {
    document.getElementById("filter-category").value = "";
    document.getElementById("filter-title").value = "";
    document.getElementById("filter-from").value = "";
    document.getElementById("filter-to").value = "";
    loadExpenses();
}

loadExpenses();
loadSummary();
</script>
</body>
</html>
